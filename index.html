<!DOCTYPE html>
<html>
<head>
    <title>Joe Wilson CV</title>

    <style>
        #background-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: -1;
}
            body {
            margin: 0;
            overflow-x: hidden;
}
    

        .typewriter {
            overflow: hidden;
            border-right: .15em solid orange;
            white-space: nowrap;
            margin: 0 auto;
            letter-spacing: 1.em;
            width: fit-content;
            animation: 
                typing 1s steps(140, end),
                blink-caret .55s step-end infinite;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 24% }
        }

        @keyframes blink-caret {
            from, to { border-color: transparent; }
            50% { border-color: #00ff00; }
        }

        .key {
            background-color: black;
            color: #00ff00;
            border: 1px solid #00ff00;
            font-family: monospace;
            padding: 12px 25px;
            cursor: pointer;
            margin: 10px;
        }

        .key:active {
            box-shadow: 1px 1px 0px white;
            transform: translate(2px, 2px);
        }
    </style>

</head>

<body>
    <video autoplay muted loop playsinline id="background-video">
    <source src="https://joewilson98.github.io/images/17077-278405114_medium.mp4" type="video/mp4">
    </video>

    <h1 class="typewriter" style="text-align: center; font-family: monospace; font-weight: bold; color:black; font-size: 50px">
        Joe Wilson
    </h1>
    <h1 style="text-align: center; font-family: monospace; font-size: 30px; color:black;">
        Systems and Network Administrator
    </h1>

    <div style="text-align: center; margin-top: 100px;"> 
        <button class="key">> About_</button>
        <button class="key">> CV_</button>
        <button class="key">> Links_</button>
    </div>

</body>
</html>
